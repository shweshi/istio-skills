# Waypoint gateways and their attachment
# kubectl get gateways.gateway.networking.k8s.io -A -o yaml

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: logistics-waypoint
  namespace: logistics
  annotations:
    istio.io/for-service-account: logistics-api-sa
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
---
# No waypoint defined for the tracking namespace
# kubectl get gateways.gateway.networking.k8s.io -n tracking returned: No resources found.
