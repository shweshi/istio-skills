apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: storefront
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: default-deny-storefront
  namespace: storefront
spec: {}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-cart-to-catalog
  namespace: storefront
spec:
  selector:
    matchLabels:
      app: catalog
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/storefront/sa/cart-sa
    to:
    - operation:
        methods: ["GET"]
        ports: ["8080"]
